; RoboForge runtime firmware — ESP32
;
; The single pre-built firmware the app flashes ONCE. It reads its robot config
; at runtime (pushed by the app over WiFi/serial), so changing sensors or pins
; needs no recompile. See docs/adr/0006-firmware-build-strategy.md

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    links2004/WebSockets @ ^2.4.1
    bblanchon/ArduinoJson @ ^7.0.4
